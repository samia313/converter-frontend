<!DOCTYPE html>
<html>
<head>
  <title>Converter SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      background: #0f766e;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🚀 Converter SaaS</h2>

  <input id="text" placeholder="Enter text">

  <br>

  <button onclick="convert()">Convert</button>

  <div class="result" id="result">Result will show here</div>
</div>

<script>
async function convert() {
  const text = document.getElementById("text").value;

  document.getElementById("result").innerText = "Loading...";

  const res = await fetch("http://143.198.40.238:3000/convert", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ data: text })
  });

  const data = await res.json();

  document.getElementById("result").innerText = data.result;
}
</script>

</body>
</html>
